<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimi's Shop Manager 🎀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <!-- Mobile top navbar -->
  <nav class="navbar navbar-light d-lg-none mobile-navbar">
    <div class="container-fluid">
      <span class="navbar-brand d-flex align-items-center gap-2">
        <img src="/logo.png" alt="Mimi's Shop" class="mobile-logo" onerror="this.style.display='none'" />
        <span>Mimi's Shop</span>
      </span>
      <button class="navbar-toggler" type="button" id="mobileToggle">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <!-- Overlay to close sidebar on tablet/mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="/logo.png" alt="Mimi's Shop" onerror="this.style.display='none'" />
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-link" data-route="dashboard">
          <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </a>
        <a href="#inventory" class="nav-link" data-route="inventory">
          <i class="bi bi-box-seam"></i><span>Inventory</span>
        </a>
        <a href="#orders" class="nav-link" data-route="orders">
          <i class="bi bi-bag-check"></i><span>Orders</span>
        </a>
        <a href="#expenses" class="nav-link" data-route="expenses">
          <i class="bi bi-cash-coin"></i><span>Expenses</span>
        </a>
      </nav>
      <div class="sidebar-footer">Mimi's Shop Manager 🎀</div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main-content"></main>
  </div>

  <!-- Toast container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1200;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/inventory.js"></script>
  <script src="/js/orders.js"></script>
  <script src="/js/expenses.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
